# 用途: API、Knowledge MCP、Ticket MCPを別コンテナでまとめて起動する。
# 必要な理由: 読み取りと更新の障害・権限・ポートを分離し、本番に近い接続をローカルで再現するため。
# 関連ファイル: Dockerfileから共通イメージを作り、main.pyと2つのmcp_*_server.pyを個別に起動する。
services:
  knowledge-mcp:
    # 社内規程検索だけを公開する読み取り専用境界。
    build: .
    command: python mcp_knowledge_server.py
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8790
    volumes:
      - ./data:/app/data
    ports:
      - "8790:8790"
    restart: unless-stopped

  ticket-mcp:
    # Human approval後のチケット下書きだけを公開する更新境界。
    build: .
    command: python mcp_ticket_server.py
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8791
    volumes:
      - ./data:/app/data
    ports:
      - "8791:8791"
    restart: unless-stopped

  api:
    # JavaScript UI、ログイン、RBAC/ABAC、Agent実行、承認APIを提供する入口。
    build: .
    command: python main.py
    env_file:
      - .env.local
    environment:
      API_HOST: 0.0.0.0
      PORT: 8787
      KNOWLEDGE_MCP_URL: http://knowledge-mcp:8790/mcp
      TICKET_MCP_URL: http://ticket-mcp:8791/mcp
    volumes:
      - ./data:/app/data
    ports:
      - "8787:8787"
    depends_on:
      - knowledge-mcp
      - ticket-mcp
    restart: unless-stopped
