# 用途: Agent、MCP接続、Tool境界、認証、運用制限をまとめる設定ファイル。
# 必要な理由: 環境や運用方針の変更を、Pythonロジックの書き換えなしで行うため。
# 関連ファイル: app/config.pyが読み込み、main.py、app/agent_service.py、両MCPサーバーへ配る。
application:
  name: enterprise-ai-agent
  environment: ${APP_ENV:-development}
  api_host: ${API_HOST:-127.0.0.1}
  api_port: ${PORT:-8787}

auth:
  session_secret: ${SESSION_SECRET:-development-session-secret-change-in-production}
  mcp_token_secret: ${MCP_AUTH_SECRET:-development-mcp-secret-change-in-production}
  session_minutes: 480
  mcp_token_minutes: 5
  cookie_secure: ${COOKIE_SECURE:-false}
  cookie_name: agent_session

openai:
  model: ${OPENAI_MODEL:-gpt-5.4-mini}
  max_turns: 12
  tracing_enabled: true

mcp:
  servers:
    # 読み取り系と更新系を別プロセス・別権限へ分離する。
    knowledge:
      server_name: knowledge-tools
      url: ${KNOWLEDGE_MCP_URL:-http://127.0.0.1:8790/mcp}
      stateless_http: true
      json_response: true
      timeout_seconds: 20
      tools:
        allowlist:
          - search_policy
        blocklist:
          - raw_data_export
        approval_required: []
    ticketing:
      server_name: ticket-tools
      url: ${TICKET_MCP_URL:-http://127.0.0.1:8791/mcp}
      stateless_http: true
      json_response: true
      timeout_seconds: 20
      tools:
        allowlist:
          - draft_ticket
        blocklist:
          - delete_ticket
        approval_required:
          - draft_ticket

agents:
  # 各Agentの責務を狭くし、Supervisorだけが処理を振り分ける。
  supervisor:
    name: Supervisor Agent
    instructions: |
      あなたは企業向けAIエージェントのSupervisorです。ユーザーの依頼を分析し、
      Research AgentとAction Agentへ必要な作業だけを委任してください。
      回答には根拠となる規程IDを含め、根拠がなければ推測しないでください。
      更新操作は必ず承認中断を通し、承認前に実行済みと表現しないでください。
  research:
    name: Research Agent
    instructions: |
      社内規程の調査担当です。search_policyだけを使用し、取得した規程ID、名称、本文を
      正確にSupervisorへ返してください。根拠のない補完は禁止です。
  action:
    name: Action Agent
    instructions: |
      業務操作担当です。ユーザーが明示的に作成を希望した場合のみdraft_ticketを使ってください。
      draft_ticketは人間承認が必要です。承認されるまで実行結果を作らないでください。
  review:
    name: Review Agent
    instructions: |
      回答と操作計画をレビューし、PII、根拠不足、権限不足、未承認の更新操作を検出してください。

security:
  # API入口で使うRBAC、rate limit、監査保持、承認roleの共通ポリシー。
  default_role: employee
  permitted_roles:
    - employee
    - manager
    - finance
    - admin
  rate_limit_per_minute: 20
  pii_masking: true
  audit_retention: 5000
  approval_roles:
    - manager
    - finance
    - admin
